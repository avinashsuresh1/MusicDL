<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MusicDL — Modular DAW & Synthesizer</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      /* Colors */
      --bg-app: #090810;
      --bg-panel: rgba(20, 18, 36, 0.7);
      --bg-sidebar: #0f0d1a;
      --bg-toolbar: #131124;
      --border-color: rgba(255, 255, 255, 0.08);
      
      --primary: #9b51e0;
      --primary-glow: rgba(155, 81, 224, 0.25);
      --secondary: #00f2fe;
      --secondary-glow: rgba(0, 242, 254, 0.25);
      --accent: #ff007f;
      --accent-glow: rgba(255, 0, 127, 0.25);
      
      --text-main: #f5f5f7;
      --text-muted: #8e8e93;
      --text-active: #ffffff;
      
      --font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
      --panel-blur: blur(20px);
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background-color: var(--bg-app);
      overflow: hidden;
      font-family: var(--font-family);
    }
  </style>
</head>
<body>
  <mdl-app></mdl-app>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
